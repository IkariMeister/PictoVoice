name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-check:
    name: Gradle checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: >
          sdkmanager
          "platform-tools"
          "platforms;android-35"
          "build-tools;35.0.0"

      - name: Run tests, lint, and builds
        working-directory: pictovoice
        run: >
          gradle
          :composeApp:test
          :shared:core-model:test
          :shared:core-ui:test
          :shared:core-telemetry:test
          :shared:feature-vocabulary:test
          :shared:feature-communication:test
          :composeApp:lint
          :shared:core-model:lint
          :shared:core-ui:lint
          :shared:core-telemetry:lint
          :shared:feature-vocabulary:lint
          :shared:feature-communication:lint
          :composeApp:assembleDebug
          :shared:core-model:build
          :shared:core-ui:build
          :shared:core-telemetry:build
          :shared:feature-vocabulary:build
          :shared:feature-communication:build
          --stacktrace
