name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-check:
    name: Gradle checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run shared module checks
        working-directory: pictovoice
        run: >
          gradle
          :shared:core-model:check
          :shared:core-ui:check
          :shared:core-telemetry:check
          :shared:feature-vocabulary:check
          :shared:feature-communication:check
          --stacktrace
